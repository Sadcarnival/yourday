<title>your day</title>

<!--
════════════════════════════════════════════════════════
  YOUR DAY — SETUP GUIDE
════════════════════════════════════════════════════════

  STEP 1 — Create a Firebase project
  ───────────────────────────────────
  1. Go to https://console.firebase.google.com
  2. Click "Add project" → give it a name → create
  3. In the left sidebar: Build → Authentication
     → Get started → Google → Enable → Save
  4. In the left sidebar: Build → Firestore Database
     → Create database → Start in production mode
     → Pick a region close to you → Done
  5. Click the </> icon (Web) on the project overview page
     → Register app (any nickname) → copy the firebaseConfig
     object and paste it below, replacing the placeholders

  STEP 2 — Add your GitHub Pages domain to Firebase
  ───────────────────────────────────────────────────
  Authentication → Settings → Authorized domains
  → Add domain → paste: YOUR-USERNAME.github.io

  STEP 3 — Set Firestore rules (so only you can read your data)
  ──────────────────────────────────────────────────────────────
  Firestore → Rules → replace with:

  rules_version = '2';
  service cloud.firestore {
    match /databases/{database}/documents {
      match /users/{userId}/{document=**} {
        allow read, write: if request.auth != null && request.auth.uid == userId;
      }
    }
  }

  STEP 4 — Deploy to GitHub Pages
  ─────────────────────────────────
  1. Create a new GitHub repository (public)
  2. Upload this file — rename it to  index.html
  3. Go to repo Settings → Pages → Branch: main → / (root) → Save
  4. Your app is live at: https://YOUR-USERNAME.github.io/REPO-NAME

════════════════════════════════════════════════════════
-->

<!-- Firebase SDK (v10 compat — works without a bundler) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000000;--fg:#ffffff;--dim:#8c8c8c;--inactive:rgba(255,255,255,.26);
    --border:#111111;--sheet-bg:#1b1b1b;--input-bg:#000000;--input-border:#3a3a3a;
    --meta:#5a5a5a;--meta-done:#444444;--overlay:rgba(0,0,0,.55);--btn-active:rgba(255,255,255,.13);
    --done-fg:#86c9a3;
    --pad:26px;--font:'Open Sans','Segoe UI',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html{height:100%;overflow:hidden;}
  body{position:fixed;inset:0;background:var(--bg);color:var(--fg);font-family:var(--font);overflow:hidden;
    display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;user-select:none;
    transition:background .25s,color .25s;}

  /* ── status bar ── */
  .statusbar{display:flex;justify-content:flex-end;align-items:center;gap:12px;
    padding:10px var(--pad) 0;font-size:13px;letter-spacing:.5px;color:var(--fg);min-height:30px;}

  /* ── header ── */
  .kicker{padding:14px var(--pad) 0;font-size:13px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--fg);opacity:.88;}
  .kicker-date{padding:3px var(--pad) 0;font-size:11px;font-weight:400;letter-spacing:.8px;color:var(--dim);}

  /* ── pivot ── */
  .pivot{overflow:hidden;padding:2px 0 10px;}
  .pivot-strip{display:flex;align-items:flex-end;white-space:nowrap;will-change:transform;}
  .pivot-strip.animate{transition:transform .34s cubic-bezier(.1,.9,.2,1);}
  .pivot-title{font-size:58px;font-weight:300;line-height:1;letter-spacing:-1px;color:var(--inactive);padding-right:34px;will-change:opacity;}
  .pivot-strip.animate .pivot-title{transition:opacity .34s ease,color .25s;}

  /* ── pager ── */
  .pager{flex:1;display:flex;will-change:transform;min-height:0;touch-action:pan-y;}
  .pager.animate{transition:transform .34s cubic-bezier(.1,.9,.2,1);}
  .panel{width:100vw;flex:0 0 100vw;height:100%;overflow-y:auto;overflow-x:hidden;
    padding:14px var(--pad) 120px;-webkit-overflow-scrolling:touch;touch-action:pan-y;}

  /* ── swipe reveal backgrounds ── */
  .task-wrap{position:relative;overflow:hidden;}
  .sw-bg{position:absolute;top:0;bottom:0;width:100%;display:flex;align-items:center;padding:0 var(--pad);opacity:0;pointer-events:none;z-index:0;}
  .sw-bg.demote{background:#0d2a1a;justify-content:flex-start;}
  .sw-bg.promote{background:#161630;justify-content:flex-end;}
  .sw-label{font-size:10.5px;font-weight:600;letter-spacing:1.5px;text-transform:lowercase;display:flex;align-items:center;gap:6px;}
  .sw-bg.demote .sw-label{color:#86c9a3;}
  .sw-bg.promote .sw-label{color:#9999cc;}
  /* swipe snap + flash */
  .task-sw-anim{transition:transform .22s cubic-bezier(.1,.9,.2,1)!important;}
  @keyframes swFD{0%{background:#0d2a1a}100%{background:var(--bg)}}
  @keyframes swFP{0%{background:#161630}100%{background:var(--bg)}}
  .flash-d{animation:swFD .45s ease forwards;}
  .flash-p{animation:swFP .45s ease forwards;}

  /* ── tasks ── */
  .task{padding:14px 0;transition:opacity .2s;position:relative;z-index:1;display:flex;align-items:flex-start;gap:12px;touch-action:pan-y;will-change:transform;background:var(--bg);}
  .task-body{flex:1;min-width:0;cursor:pointer;}
  .task-body .t-title{font-size:30px;font-weight:300;line-height:1.15;color:var(--fg);word-break:break-word;transition:font-size .2s,color .25s;}
  /* done state */
  .task.done .t-title{text-decoration:line-through;opacity:.35;}
  .task.done .t-note,.task.done .t-bullets,.task.done .t-checklist,.task.done .t-attrs{opacity:.28;}
  .task.done .t-meta{color:var(--done-fg);opacity:1;font-weight:400;letter-spacing:.4px;}
  /* indents */
  .task.indent-1{padding-left:20px;}
  .task.indent-2{padding-left:38px;}
  .task.indent-3{padding-left:56px;}
  .task.indent-4{padding-left:74px;}
  .task.indent-5{padding-left:92px;}
  .task.indent-1::before{content:'';position:absolute;left:0;top:14px;bottom:14px;width:2px;background:var(--dim);opacity:.35;border-radius:1px;}
  .task.indent-2::before{content:'';position:absolute;left:18px;top:14px;bottom:14px;width:2px;background:var(--dim);opacity:.35;border-radius:1px;}
  .task.indent-3::before{content:'';position:absolute;left:36px;top:14px;bottom:14px;width:2px;background:var(--dim);opacity:.35;border-radius:1px;}
  .task.indent-4::before{content:'';position:absolute;left:54px;top:14px;bottom:14px;width:2px;background:var(--dim);opacity:.35;border-radius:1px;}
  .task.indent-5::before{content:'';position:absolute;left:72px;top:14px;bottom:14px;width:2px;background:var(--dim);opacity:.35;border-radius:1px;}
  .task.indent-1 .t-title{font-size:25px;}
  .task.indent-2 .t-title{font-size:21px;}
  .task.indent-3 .t-title{font-size:19px;}
  .task.indent-4 .t-title{font-size:17px;}
  .task.indent-5 .t-title{font-size:16px;}
  /* selection circle */
  .task-sel{flex-shrink:0;width:22px;height:22px;border-radius:50%;border:1.5px solid var(--dim);background:transparent;display:none;align-items:center;justify-content:center;margin-top:7px;transition:border-color .18s,background .18s;position:relative;}
  .task-sel::after{content:'';position:absolute;width:5px;height:9px;border-right:1.5px solid transparent;border-bottom:1.5px solid transparent;transform:rotate(45deg) translate(-1px,-2px);transition:border-color .18s;}
  body.sel-mode .task-sel{display:flex;}
  body.sel-mode .task-check{display:none;}
  .task.task-sel-on .task-sel{background:var(--fg);border-color:var(--fg);}
  .task.task-sel-on .task-sel::after{border-right-color:var(--bg);border-bottom-color:var(--bg);}
  /* round checkbox */
  .task-check{flex-shrink:0;width:26px;height:26px;border-radius:50%;border:1.5px solid var(--dim);background:transparent;cursor:pointer;padding:0;margin-top:6px;display:flex;align-items:center;justify-content:center;transition:border-color .22s,background .22s;position:relative;}
  .task-check::after{content:'';position:absolute;width:5px;height:9px;border-right:1.5px solid transparent;border-bottom:1.5px solid transparent;transform:rotate(45deg) translate(-1px,-2px);transition:border-color .22s;}
  .task.done .task-check{border-color:var(--done-fg);}
  .task.done .task-check::after{border-right-color:var(--done-fg);border-bottom-color:var(--done-fg);}
  /* note types */
  .t-note{font-size:16px;font-weight:400;color:var(--dim);margin-top:4px;word-break:break-word;line-height:1.45;}
  .t-bullets{margin-top:6px;}
  .t-bullet{font-size:15px;color:var(--dim);padding:1px 0;word-break:break-word;line-height:1.45;}
  .t-bullet::before{content:'· ';opacity:.6;}
  .t-checklist{margin-top:6px;}
  .chk-item{display:flex;align-items:flex-start;gap:9px;padding:3px 0;cursor:pointer;}
  .chk-mark{font-size:13px;color:var(--dim);flex-shrink:0;margin-top:2px;line-height:1;width:14px;text-align:center;}
  .chk-text{font-size:15px;color:var(--dim);line-height:1.45;word-break:break-word;}
  .chk-item.chk-done .chk-text{text-decoration:line-through;opacity:.45;}
  .chk-item.chk-done .chk-mark{opacity:.45;}
  .t-meta{font-size:11.5px;letter-spacing:.3px;color:var(--meta);margin-top:5px;line-height:1.5;}
  .t-attrs{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:lowercase;color:var(--dim);margin-top:3px;opacity:.8;}
  .empty{padding:40px 0;font-size:19px;font-weight:300;color:var(--dim);line-height:1.5;}

  /* ── overview panel: collapsible calendar ── */
  .cal{border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-top:2px;background:rgba(128,128,128,.03);}
  .cal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;}
  .cal-month{font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--fg);opacity:.85;}
  .cal-chevron{width:20px;height:20px;display:flex;align-items:center;justify-content:center;transition:transform .3s cubic-bezier(.2,.9,.25,1);color:var(--dim);}
  .cal.expanded .cal-chevron{transform:rotate(180deg);}
  .cal-week{display:flex;justify-content:space-between;padding:0 16px 16px;transition:opacity .2s,max-height .3s ease,padding .3s ease;overflow:hidden;}
  .cal.expanded .cal-week{max-height:0;padding-top:0;padding-bottom:0;opacity:0;pointer-events:none;}
  .cal-day{display:flex;flex-direction:column;align-items:center;gap:5px;width:13%;cursor:pointer;}
  .cal-day .dow{font-size:9px;color:var(--dim);letter-spacing:.5px;text-transform:uppercase;}
  .cal-day .num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:400;color:var(--fg);transition:background .2s,color .2s,border-color .2s;}
  .cal-day.today .num{border:1.5px solid var(--done-fg);color:var(--done-fg);font-weight:600;}
  .cal-day.selected .num{background:var(--fg);color:var(--bg);border-color:transparent;}
  .cal-day .dot{width:4px;height:4px;border-radius:50%;background:var(--done-fg);opacity:0;margin-top:-2px;}
  .cal-day.has-tasks .dot{opacity:1;}
  .cal-month-grid{max-height:0;overflow:hidden;opacity:0;transition:max-height .35s cubic-bezier(.2,.9,.25,1),opacity .3s ease,padding .3s ease;padding:0 16px;}
  .cal.expanded .cal-month-grid{max-height:380px;opacity:1;padding:0 16px 16px;}
  .cal-nav{display:flex;align-items:center;justify-content:space-between;padding:6px 2px 14px;}
  .cal-nav button{background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-family:var(--font);}
  .cal-nav .lbl{font-size:13px;color:var(--fg);font-weight:300;letter-spacing:.5px;}
  .cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px;}
  .cal-dow-row span{font-size:9px;color:var(--dim);text-align:center;letter-spacing:.5px;text-transform:uppercase;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);row-gap:6px;}
  .cal-cell{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;}
  .cal-cell .num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--fg);transition:background .2s,color .2s,border-color .2s;}
  .cal-cell.muted .num{color:var(--inactive);}
  .cal-cell.today .num{border:1.5px solid var(--done-fg);color:var(--done-fg);font-weight:600;}
  .cal-cell.selected .num{background:var(--fg);color:var(--bg);border-color:transparent;}
  .cal-cell .dot{width:3.5px;height:3.5px;border-radius:50%;background:var(--done-fg);opacity:0;}
  .cal-cell.has-tasks .dot{opacity:1;}

  /* ── overview agenda ── */
  .agenda-head{display:flex;align-items:baseline;justify-content:space-between;margin-top:22px;margin-bottom:4px;}
  .agenda-title{font-size:28px;font-weight:300;color:var(--fg);}
  .agenda-count{font-size:11px;color:var(--dim);}
  .cat-tag{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--done-fg);opacity:.85;margin-bottom:3px;}
  .add-for-day{margin-top:8px;display:flex;align-items:center;gap:9px;color:var(--dim);font-size:14px;letter-spacing:.2px;cursor:pointer;padding:10px 0;}
  .add-for-day .plus-circle{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--dim);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}

  /* ── sheet: category picker + due date ── */
  .due-date-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .due-date-pill{position:relative;overflow:hidden;}
  .due-date-pill input[type="date"]{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;}


  /* ── app bar ── */
  .appbar{position:fixed;left:0;right:0;bottom:0;height:74px;background:var(--bg);
    display:flex;align-items:center;justify-content:space-between;padding:0 var(--pad);
    border-top:1px solid var(--border);transition:background .25s,border-color .25s;gap:12px;}
  .appbar-left{display:flex;align-items:center;gap:10px;}
  .addbtn{width:46px;height:46px;border-radius:50%;border:2px solid var(--fg);background:transparent;color:var(--fg);font-size:30px;font-weight:300;display:flex;align-items:center;justify-content:center;cursor:pointer;padding-bottom:3px;transition:background .15s,border-color .25s,color .25s;}
  .addbtn:active{background:var(--btn-active);}
  .themebtn{width:36px;height:36px;border-radius:50%;border:2px solid var(--fg);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .25s,background .15s;flex-shrink:0;}
  .themebtn:active{background:var(--btn-active);}
  .theme-disc{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--fg);transition:background .25s,border-color .25s;}
  /* user avatar button */
  .user-btn{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--dim);background:transparent;color:var(--fg);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;display:none;align-items:center;justify-content:center;transition:border-color .2s,background .15s;letter-spacing:0;flex-shrink:0;}
  .user-btn:active{background:var(--btn-active);}
  .user-btn.visible{display:flex;}
  /* sync indicator */
  .sync-dot{width:6px;height:6px;border-radius:50%;background:var(--done-fg);opacity:0;transition:opacity .3s;flex-shrink:0;}
  .sync-dot.active{opacity:1;}

  /* ── selection action bar ── */
  .sel-bar{position:fixed;left:0;right:0;bottom:0;z-index:40;height:88px;background:var(--bg);border-top:1px solid var(--border);display:none;align-items:center;justify-content:space-between;padding:18px var(--pad) 0;transition:background .25s,border-color .25s;}
  .sel-bar.active{display:flex;}
  .sel-count{font-size:13px;font-weight:300;letter-spacing:.8px;color:var(--dim);}
  .sel-actions{display:flex;gap:18px;}
  .metro-btn-wrap{position:relative;display:flex;flex-direction:column;align-items:center;}
  .metro-btn-tip{position:absolute;bottom:calc(100% + 12px);left:50%;transform:translateX(-50%);background:var(--fg);color:var(--bg);font-family:var(--font);font-size:10px;font-weight:600;letter-spacing:1.4px;text-transform:lowercase;padding:4px 8px;white-space:nowrap;pointer-events:none;line-height:1.4;}
  .metro-btn-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--fg);}
  .metro-btn-wrap:nth-child(1) .metro-btn-tip{bottom:calc(100% + 7px);}
  .metro-btn-wrap:nth-child(2) .metro-btn-tip{bottom:calc(100% + 19px);}
  .metro-btn-wrap:nth-child(3) .metro-btn-tip{bottom:calc(100% + 6px);}
  .metro-btn-wrap:nth-child(4) .metro-btn-tip{bottom:calc(100% + 18px);}
  .metro-btn-wrap:nth-child(5) .metro-btn-tip{bottom:calc(100% + 8px);}
  .metro-btn-wrap:nth-child(6) .metro-btn-tip{bottom:calc(100% + 18px);}
  .metro-btn{width:44px;height:44px;border-radius:50%;border:1.5px solid var(--fg);background:transparent;color:var(--fg);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .25s,color .25s;flex-shrink:0;}
  .metro-btn:active{background:var(--btn-active);}

  /* ── sheets ── */
  .sheet-bg{position:fixed;inset:0;background:var(--overlay);display:none;z-index:20;}
  .sheet-bg.open{display:block;}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:21;background:var(--sheet-bg);padding:22px var(--pad) 36px;transform:translateY(100%);transition:transform .26s ease,background .25s;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .sheet.open{transform:translateY(0);}
  .sheet h2{font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:16px;}
  .sheet input[type="text"],.sheet input[type="time"]{display:block;width:100%;background:var(--input-bg);border:2px solid var(--input-border);color:var(--fg);font-family:var(--font);font-size:20px;font-weight:300;padding:12px 14px;outline:none;border-radius:0;-webkit-user-select:text;user-select:text;transition:background .25s,border-color .25s,color .25s;}
  .sheet input[type="text"]:focus,.sheet input[type="time"]:focus{border-color:var(--fg);}
  .sheet input::placeholder,.note-area::placeholder{color:var(--dim);}
  .note-text-input{font-size:16px;margin-top:10px;}
  .note-area{display:none;width:100%;background:var(--input-bg);border:2px solid var(--input-border);color:var(--fg);font-family:var(--font);font-size:15px;font-weight:300;line-height:1.65;padding:12px 14px;outline:none;border-radius:0;resize:none;min-height:96px;margin-top:10px;-webkit-user-select:text;user-select:text;transition:background .25s,border-color .25s,color .25s;}
  .note-area:focus{border-color:var(--fg);}
  .note-area.show{display:block;}
  .sheet-section{margin-top:20px;}
  .sheet-label{font-size:10.5px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:10px;}
  .pill-row{display:flex;flex-wrap:wrap;gap:8px;}
  .pill{padding:7px 13px;border:1.5px solid var(--input-border);background:transparent;color:var(--dim);font-family:var(--font);font-size:13px;letter-spacing:.4px;text-transform:lowercase;cursor:pointer;transition:border-color .15s,color .15s,background .15s;}
  .pill.active{border-color:var(--fg);color:var(--fg);}
  .time-row{margin-top:10px;display:none;}
  .time-row.show{display:block;}
  .sheet input[type="time"]{font-size:18px;}
  .notif-note{font-size:11px;color:var(--dim);margin-top:8px;letter-spacing:.3px;min-height:16px;}
  .indent-controls{display:flex;align-items:center;gap:14px;margin-top:4px;}
  .indent-step{width:36px;height:36px;border:1.5px solid var(--input-border);background:transparent;color:var(--fg);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s,color .15s;font-family:var(--font);}
  .indent-step:active{background:var(--btn-active);}
  .indent-val{font-size:20px;font-weight:300;color:var(--fg);min-width:24px;text-align:center;}
  .indent-hint{font-size:11px;color:var(--dim);letter-spacing:.3px;}
  .sheet-actions{display:flex;gap:12px;margin-top:22px;}
  .sheet-actions button{flex:1;padding:13px;background:transparent;border:2px solid var(--fg);color:var(--fg);font-family:var(--font);font-size:15px;letter-spacing:1px;text-transform:lowercase;cursor:pointer;transition:background .25s,border-color .25s,color .25s;}

  .action-btn{display:block;width:100%;padding:17px 0;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--fg);font-family:var(--font);font-size:17px;font-weight:300;text-align:left;cursor:pointer;letter-spacing:.2px;}

  .action-btn:last-child{border-bottom:none;}
  .action-del{color:#d95f5f;}
  /* swatches */
  #themeSheet .swatches{display:flex;gap:18px;flex-wrap:wrap;margin:4px 0 8px;}
  .swatch-item{display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;}
  .swatch-circle{width:42px;height:42px;border-radius:50%;border:2.5px solid transparent;position:relative;transition:border-color .18s,transform .12s;}
  .swatch-circle.active{border-color:var(--fg);transform:scale(1.12);}
  .swatch-circle::after{content:'';position:absolute;inset:2px;border-radius:50%;border:1px solid rgba(128,128,128,.25);}
  .swatch-label{font-size:10.5px;letter-spacing:.5px;text-transform:lowercase;color:var(--dim);text-align:center;}
  .swatch-item.active .swatch-label{color:var(--fg);}
  .cat-opt-name{font-size:19px;font-weight:300;color:var(--fg);margin-bottom:6px;word-break:break-word;}
  /* reorder */
  #reorderList{position:relative;}
  .reorder-item{display:flex;align-items:center;gap:16px;padding:17px 0;border-bottom:1px solid var(--border);touch-action:none;position:relative;background:var(--sheet-bg);transition:transform .18s ease,box-shadow .18s,background .25s;}
  .reorder-item:last-child{border-bottom:none;}
  .reorder-item.is-dragging{transition:box-shadow .18s;z-index:10;box-shadow:0 10px 32px rgba(0,0,0,.32);}
  .reorder-handle{font-size:18px;color:var(--dim);opacity:.45;flex-shrink:0;line-height:1;letter-spacing:-1px;}
  .reorder-name{font-size:22px;font-weight:300;color:var(--fg);flex:1;word-break:break-word;}
  .reorder-count{font-size:13px;color:var(--dim);flex-shrink:0;}

  .panel-add{cursor:pointer;}
  .cat-add-prompt{padding:40px 0 0;display:flex;flex-direction:column;gap:10px;}
  .cat-add-plus{font-size:56px;font-weight:300;line-height:1;color:var(--dim);opacity:.55;}
  .cat-add-label{font-size:19px;font-weight:300;color:var(--dim);line-height:1.5;}
  /* toast */
  /* ── pill toast ── */
  .toast-wrap{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;max-width:92%;}
  .toast{
    display:inline-flex;align-items:center;gap:10px;
    background:var(--fg);color:var(--bg);
    padding:11px 20px 11px 14px;border-radius:999px;
    box-shadow:0 8px 28px rgba(0,0,0,.4);
    white-space:nowrap;max-width:100%;
    transform:translateY(-150%);opacity:0;
    transition:transform .3s cubic-bezier(.2,.9,.25,1),opacity .25s ease;
  }
  .toast.visible{transform:translateY(0);opacity:1;}
  .toast .toast-icon{
    width:22px;height:22px;border-radius:50%;flex-shrink:0;

  .toast .toast-txt{display:flex;flex-direction:column;line-height:1.25;min-width:0;}
  .toast .toast-title{font-size:8px;font-weight:600;letter-spacing:1.6px;text-transform:uppercase;opacity:.5;}

  /* account sheet */

  .acct-info{flex:1;min-width:0;}
  .acct-name{font-size:18px;font-weight:300;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .acct-email{font-size:12px;color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .acct-sync{font-size:11px;color:var(--dim);margin-top:14px;letter-spacing:.3px;padding-bottom:4px;}

  /* ── splash ── */
  .splash{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;flex-direction:column;animation:splashIn .4s ease both;}
  @keyframes splashIn{from{opacity:0}to{opacity:1}}
  .splash.hiding{opacity:0;pointer-events:none;transition:opacity .5s ease;}
  .splash-center{flex:1;display:flex;align-items:center;justify-content:flex-start;padding:0 var(--pad);}
  /* ── splash composition — fixed colors, same on all themes ── */
  .splash-comp{
    position:relative;
    font-size:min(180px,46vw);   /* large enough for the bowl to dwarf the strip letters */
    line-height:1;
    display:inline-block;
  }
  /* "day" — light gray, slides in from the right — IN FRONT (z-index 2) */
  .splash-day{
    font-size:1em;font-weight:300;letter-spacing:-4px;
    color:#bdbdbd;
    white-space:nowrap;display:block;
    position:relative;z-index:2;
    animation:splashDayIn .72s cubic-bezier(.1,.9,.2,1) .32s both;
  }
  @keyframes splashDayIn{from{opacity:0;transform:translateX(80px)}to{opacity:1;transform:none}}
  /* "your" strip — BEHIND the "d" (z-index 1); bowl interior reveals o and y */
  .splash-your-strip{
    position:absolute;
    top:0;bottom:0;
    left:0.14em;
    width:0.20em;
    background:#5e5e5e;
    z-index:1;
    display:flex;
    align-items:center;justify-content:center;
    overflow:hidden;
    animation:splashYourUp .68s cubic-bezier(.1,.9,.2,1) .08s both;
  }
  @keyframes splashYourUp{from{opacity:0;transform:translateY(90px)}to{opacity:1;transform:none}}
  /* single word "your" rotated 270° — writing-mode vertical-rl + rotate(180deg) */
  .splash-your-word{
    writing-mode:vertical-rl;
    transform:rotate(180deg);
    font-size:0.13em;       /* bigger so letters are visible inside the bowl */
    font-weight:400;
    color:#f0f0f0;
    letter-spacing:0.75em;  /* spreads r u o y evenly across the full strip height */
    white-space:nowrap;
  }
  .splash-bottom{padding:0 var(--pad) 68px;min-height:120px;display:flex;flex-direction:column;justify-content:flex-end;}
  /* Google sign-in state */
  .splash-signin{display:none;animation:splashFormIn .4s ease .45s both;}
  .splash-signin.show{display:block;}
  @keyframes splashFormIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .splash-error{font-size:12px;color:#c45f5f;letter-spacing:.3px;margin-top:10px;min-height:18px;}
  .google-btn{display:flex;align-items:center;gap:14px;width:100%;background:transparent;border:1.5px solid var(--fg);color:var(--fg);font-family:var(--font);font-size:14px;font-weight:400;letter-spacing:1.5px;text-transform:lowercase;padding:14px 20px;cursor:pointer;transition:background .15s;}
  .google-btn:active{background:var(--btn-active);}
  .google-btn svg{flex-shrink:0;}
  /* loading spinner */
  .splash-loading{display:none;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--dim);}
  .splash-loading.show{display:block;}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:.8}}
  .splash-loading{animation:pulse 1.4s ease infinite;}
</style>
</head>

function applyTheme(name){
  const t=THEMES[name]||THEMES.dark,r=document.documentElement.style;
  r.setProperty('--bg',t.bg);r.setProperty('--fg',t.fg);r.setProperty('--dim',t.dim);
  r.setProperty('--inactive',t.inactive);r.setProperty('--border',t.border);
  r.setProperty('--sheet-bg',t.sheetBg);r.setProperty('--input-bg',t.inputBg);
  r.setProperty('--input-border',t.inputBorder);r.setProperty('--meta',t.meta);
  r.setProperty('--meta-done',t.metaDone);r.setProperty('--overlay',t.overlay);
  r.setProperty('--btn-active',t.btnActive);r.setProperty('--done-fg',t.doneFg);

  disc.style.background=t.bg==='#000000'?'#fff':t.bg;disc.style.borderColor=t.fg;
  renderSwatches();

  if(currentUser) persistTheme();
}

const MONS=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
function fmtStamp(ts){
  if(!ts)return'';const d=new Date(ts),now=new Date();
  const tod=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const yes=new Date(+tod-86400000);
  let s=d>=tod?'today':d>=yes?'yesterday':DAYS[d.getDay()]+' '+d.getDate()+' '+MONS[d.getMonth()];
  const hh=d.getHours(),mm=String(d.getMinutes()).padStart(2,'0');
  return s+' · '+(hh%12||12)+':'+mm+' '+(hh>=12?'pm':'am');
}
function fmt12(t){if(!t)return'';const[h,m]=t.split(':').map(Number);return(h%12||12)+':'+String(m).padStart(2,'0')+' '+(h>=12?'pm':'am');}
function nextOccurrence(ts){const[h,m]=ts.split(':').map(Number),d=new Date();d.setSeconds(0,0);d.setHours(h,m);if(d<=new Date())d.setDate(d.getDate()+1);return d.getTime();}
function normalizeNote(n){if(!n)return null;if(typeof n==='string')return n.trim()?{type:'text',text:n}:null;return n;}

/* ══ NOTE RENDERING ══ */
function renderNoteEl(note,taskId){
  const n=normalizeNote(note);if(!n)return null;
  if(n.type==='text'){const el=document.createElement('div');el.className='t-note';el.textContent=n.text;return el;}
  if(n.type==='bullets'){const wrap=document.createElement('div');wrap.className='t-bullets';(n.items||[]).forEach(item=>{const row=document.createElement('div');row.className='t-bullet';row.textContent=item;wrap.appendChild(row);});return wrap;}
  if(n.type==='checklist'){
    const wrap=document.createElement('div');wrap.className='t-checklist';
    (n.items||[]).forEach((item,i)=>{
      const row=document.createElement('div');row.className='chk-item'+(item.checked?' chk-done':'');
      row.dataset.taskId=taskId;row.dataset.idx=i;
      const mark=document.createElement('span');mark.className='chk-mark';mark.textContent=item.checked?'✓':'○';
      const txt=document.createElement('span');txt.className='chk-text';txt.textContent=item.text;
      row.appendChild(mark);row.appendChild(txt);wrap.appendChild(row);
    });return wrap;
  }
  return null;
}

/* Firestore load */
async function load(){
  if(!currentUser)return null;
  try{
    const snap=await db.collection('users').doc(currentUser.uid).get();
    if(snap.exists){
      const d=snap.data();
      // also restore theme from cloud on first visit to a new device
      if(d.theme&&THEMES[d.theme]&&!localStorage.getItem(TKEY)){applyTheme(d.theme);}
      return d.cats?JSON.parse(d.cats):null;
    }
  }catch(e){console.warn('Load error:',e);}
  return null;
}

/* Firestore persist — debounced 1.5 s to avoid hammering writes */
let persistTimer=null;
function persist(){
  if(!currentUser)return;
  showSync(true);
  clearTimeout(persistTimer);
  persistTimer=setTimeout(async()=>{
    try{
      await db.collection('users').doc(currentUser.uid).set({
        cats:JSON.stringify(cats),
        name:getUserName(),
        theme:currentTheme,
        updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
      },{merge:true});
    }catch(e){console.warn('Persist error:',e);}
    showSync(false);
  },1500);
}
function persistTheme(){
  if(!currentUser)return;
  db.collection('users').doc(currentUser.uid).set({theme:currentTheme},{merge:true}).catch(()=>{});
}

/* Sync indicator */
function showSync(on){
  const dot=document.getElementById('syncDot');
  if(dot)dot.classList.toggle('active',on);
}

/* Real-time listener — updates the app when data changes on another device */
let unsubListen=null;
function subscribeToChanges(){
  if(unsubListen)unsubListen();
  unsubListen=db.collection('users').doc(currentUser.uid)
    .onSnapshot(snap=>{
      // hasPendingWrites = we caused this update, skip to avoid loop
      if(!snap.exists||snap.metadata.hasPendingWrites)return;
      const d=snap.data();
      if(!d||!d.cats)return;
      try{
        const remote=JSON.parse(d.cats);
        if(JSON.stringify(remote)!==JSON.stringify(cats)){
          cats=migrateData(remote);
          build(); // re-render with remote data
          showToast('your day','synced from another device');
        }
      }catch(e){}
    },()=>{});
}

function migrateData(data){data.forEach(cat=>cat.tasks.forEach(t=>{t.note=normalizeNote(t.note);if(typeof t.indent!=='number')t.indent=0;if(t.dueDate===undefined)t.dueDate=null;}));return data;}

/* ══ RECURRING ══ */
function resetRecurring(){
  const now=Date.now(),tod=new Date();tod.setHours(0,0,0,0);let ch=false;
  cats.forEach(cat=>cat.tasks.forEach(t=>{
    if(!t.done||!t.repeat||t.repeat==='none')return;
    if(t.repeat==='daily'&&t.completedAt&&t.completedAt<tod.getTime()){t.done=false;t.completedAt=null;ch=true;}
    else if(t.repeat==='weekly'&&t.completedAt&&(now-t.completedAt)>7*86400000){t.done=false;t.completedAt=null;ch=true;}
  }));
  if(ch)persist();
}

/* ══ TOAST ══ */
let toastWrap=null,toastEl=null,toastTimer=null,toastHideTimer=null;
function showToast(title,body){
  let icon='•',green=false,msg=String(body);
  const m=msg.match(/^([↳↱⏰✓⟲↑↓])\s*/);
  if(m){icon=m[1];msg=msg.slice(m[0].length);}
  else if(/synced/i.test(msg)){icon='⟲';}
  else if(/copied/i.test(title)){icon='✓';green=true;}
  else if(/remind/i.test(title)){icon='⏰';}
  if(icon==='↳'||icon==='↱'||icon==='↑'||icon==='↓'||icon==='✓')green=true;

  if(!toastWrap){toastWrap=document.createElement('div');toastWrap.className='toast-wrap';document.body.appendChild(toastWrap);}
  // reuse a single pill — updates in place so rapid actions never stack
  clearTimeout(toastHideTimer);
  if(!toastEl||!toastEl.isConnected){toastEl=document.createElement('div');toastEl.className='toast';toastWrap.appendChild(toastEl);}
  toastEl.innerHTML=`<div class="toast-icon${green?' green':''}">${icon}</div>`+
    `<div class="toast-txt"><span class="toast-title">${title}</span><span class="toast-msg">${msg}</span></div>`;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{if(toastEl)toastEl.classList.add('visible');}));

  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{
    if(!toastEl)return;
    toastEl.classList.remove('visible');
    toastHideTimer=setTimeout(()=>{if(toastEl){toastEl.remove();toastEl=null;}},400);
  },2600);
}

/* ══ REMINDERS ══ */
const activeTimers={};
function scheduleReminders(){
  Object.values(activeTimers).forEach(t=>clearTimeout(t));Object.keys(activeTimers).forEach(k=>delete activeTimers[k]);
  const now=Date.now();
  cats.forEach(cat=>cat.tasks.forEach(task=>{
    if(!task.reminder||!task.reminder.enabled||task.done)return;
    const sf=task.reminder.scheduledFor;if(!sf)return;
    const delay=sf-now;
    if(delay<=0){if(delay>-10*60000)fireReminder(task);if(task.reminder.mode==='time')rescheduleFor(task);return;}
    if(delay<48*3600000){activeTimers[task.id]=setTimeout(()=>{fireReminder(task);if(task.reminder&&task.reminder.mode==='time')rescheduleFor(task);},delay);}
  }));
}
function fireReminder(task){showToast('your day',task.text);if('Notification'in window&&Notification.permission==='granted')try{new Notification('your day',{body:task.text});}catch(_){}}
function rescheduleFor(task){if(!task.reminder||task.reminder.mode!=='time')return;task.reminder.scheduledFor=nextOccurrence(task.reminder.timeOfDay);persist();scheduleReminders();}
async function requestNotifPerm(){
  const note=document.getElementById('notifNote');
  if(!('Notification'in window)){note.textContent='notifications not available';return;}
  if(Notification.permission==='granted'){note.textContent='';return;}
  if(Notification.permission==='denied'){note.textContent='notifications blocked — enable in browser settings';return;}
  const p=await Notification.requestPermission();note.textContent=p==='granted'?'':'notifications blocked — enable in browser settings';
}

function buildAttrs(task){
  const parts=[];
  if(task.repeat&&task.repeat!=='none')parts.push('↻ '+task.repeat);
  if(task.reminder&&task.reminder.enabled){
    if(task.reminder.mode==='time')parts.push('⏰ '+fmt12(task.reminder.timeOfDay));
    else if(task.reminder.scheduledFor&&task.reminder.scheduledFor>Date.now()){const diff=Math.round((task.reminder.scheduledFor-Date.now())/60000);parts.push('⏰ in '+(diff<60?diff+' min':Math.round(diff/60)+' hr'));}

  return parts.join('  ·  ');
}

    let mt=task.createdAt?'created '+fmtStamp(task.createdAt):'';
    if(task.done&&task.completedAt)mt+=(mt?'\u2002·\u2002done ':'done ')+fmtStamp(task.completedAt);
    meta.textContent=mt;body.appendChild(meta);
    const attrs=buildAttrs(task);if(attrs){const a=document.createElement('div');a.className='t-attrs';a.textContent=attrs;body.appendChild(a);}
    el.appendChild(body);
    const check=document.createElement('button');check.className='task-check';check.setAttribute('aria-label',task.done?'mark incomplete':'mark complete');el.appendChild(check);
    attachTaskSwipe(el,bgR,bgL,task);
    wrap.appendChild(el);p.appendChild(wrap);
  });
}

/* ══════════════════════════════════════
   OVERVIEW PANEL — collapsible calendar + cross-category agenda
══════════════════════════════════════ */
function curCat(){return(index>=1&&index<=cats.length)?cats[index-1]:null;}
function findTaskLocation(taskId){
  for(let ci=0;ci<cats.length;ci++){
    const idx=cats[ci].tasks.findIndex(t=>t.id===taskId);
    if(idx>=0)return{catIdx:ci,task:cats[ci].tasks[idx]};
  }
  return null;
}
function toggleTaskById(taskId){
  const loc=findTaskLocation(taskId);if(!loc)return;
  const task=loc.task;
  task.done=!task.done;task.completedAt=task.done?Date.now():null;
  if(task.done&&activeTimers[task.id]){clearTimeout(activeTimers[task.id]);delete activeTimers[task.id];}
  else if(!task.done&&task.reminder&&task.reminder.enabled)scheduleReminders();
  persist();
  renderOverviewPanel(pager.children[0]);
  if(index>=1&&index<=cats.length&&index-1===loc.catIdx)renderPanel(loc.catIdx);
}

let calExpanded=false,calViewMonth=new Date().getMonth(),calViewYear=new Date().getFullYear(),calSelectedDate=fmtDateKey(new Date());

function fmtDateKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addDaysTo(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function sameDayAs(a,b){return fmtDateKey(a)===fmtDateKey(b);}
function datesWithTasks(){
  const s=new Set();
  cats.forEach(c=>c.tasks.forEach(t=>{if(t.dueDate)s.add(t.dueDate);}));
  return s;
}
function tasksForDate(dateKey){
  const out=[];
  cats.forEach((c,ci)=>c.tasks.forEach(t=>{if(t.dueDate===dateKey)out.push({task:t,catIdx:ci,catName:c.name});}));
  return out;
}

function renderCalWeek(){
  const wrap=document.getElementById('ovCalWeek');if(!wrap)return;
  wrap.innerHTML='';
  const today=new Date();
  const start=addDaysTo(today,-today.getDay());
  const withTasks=datesWithTasks();
  const DOWS=['sun','mon','tue','wed','thu','fri','sat'];
  document.getElementById('ovCalMonthLabel').textContent=MONTH_NAMES[calViewMonth].slice(0,3)+' '+calViewYear;
  for(let i=0;i<7;i++){
    const d=addDaysTo(start,i);const key=fmtDateKey(d);
    const isToday=sameDayAs(d,today),isSel=key===calSelectedDate,hasTasks=withTasks.has(key);
    const el=document.createElement('div');
    el.className='cal-day'+(isToday?' today':'')+(isSel?' selected':'')+(hasTasks?' has-tasks':'');
    el.innerHTML=`<span class="dow">${DOWS[d.getDay()]}</span><div class="num">${d.getDate()}</div><div class="dot"></div>`;
    el.addEventListener('click',()=>selectCalDate(d));
    wrap.appendChild(el);
  }
}
const MONTH_NAMES=['january','february','march','april','may','june','july','august','september','october','november','december'];
function shiftCalMonth(dir){
  calViewMonth+=dir;
  if(calViewMonth<0){calViewMonth=11;calViewYear--;}
  if(calViewMonth>11){calViewMonth=0;calViewYear++;}
  renderCalMonthGrid();
}
function renderCalMonthGrid(){
  const navLbl=document.getElementById('ovCalNavLabel');if(!navLbl)return;
  navLbl.textContent=MONTH_NAMES[calViewMonth]+' '+calViewYear;
  const grid=document.getElementById('ovCalGrid');grid.innerHTML='';
  const today=new Date();
  const first=new Date(calViewYear,calViewMonth,1);
  const gridStart=addDaysTo(first,-first.getDay());
  const withTasks=datesWithTasks();
  for(let i=0;i<42;i++){
    const d=addDaysTo(gridStart,i);const key=fmtDateKey(d);
    const muted=d.getMonth()!==calViewMonth;
    const isToday=sameDayAs(d,today),isSel=key===calSelectedDate,hasTasks=withTasks.has(key);
    const cell=document.createElement('div');
    cell.className='cal-cell'+(muted?' muted':'')+(isToday?' today':'')+(isSel?' selected':'')+(hasTasks?' has-tasks':'');
    cell.innerHTML=`<div class="num">${d.getDate()}</div><div class="dot"></div>`;
    cell.addEventListener('click',()=>selectCalDate(d));
    grid.appendChild(cell);
  }
}
function selectCalDate(d){
  calSelectedDate=fmtDateKey(d);
  renderCalWeek();renderCalMonthGrid();renderAgenda();
}
function renderAgenda(){
  const titleEl=document.getElementById('ovAgendaTitle');if(!titleEl)return;
  const d=new Date(calSelectedDate+'T00:00:00');
  const today=new Date();
  const isToday=sameDayAs(d,today),isTomorrow=sameDayAs(d,addDaysTo(today,1)),isYesterday=sameDayAs(d,addDaysTo(today,-1));
  const DOWS=['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  const MONS3=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  let label=isToday?'today':isTomorrow?'tomorrow':isYesterday?'yesterday':DOWS[d.getDay()]+' '+d.getDate()+' '+MONS3[d.getMonth()];
  titleEl.textContent=label;

  const items=tasksForDate(calSelectedDate);
  document.getElementById('ovAgendaCount').textContent=items.length+' task'+(items.length!==1?'s':'');

  const list=document.getElementById('ovAgendaList');list.innerHTML='';
  items.forEach(({task,catName})=>{
    const el=document.createElement('div');
    el.className='task'+(task.done?' done':'');
    el.innerHTML=`<div class="task-body">
        <div class="cat-tag">${catName}</div>
        <div class="t-title">${task.text}</div>
      </div>
      <button class="task-check" aria-label="${task.done?'mark incomplete':'mark complete'}"></button>`;
    el.querySelector('.task-check').addEventListener('click',e=>{e.stopPropagation();toggleTaskById(task.id);});
    el.querySelector('.task-body').addEventListener('click',()=>openSheet(task));
    list.appendChild(el);
  });
  const addRow=document.createElement('div');
  addRow.className='add-for-day';
  addRow.innerHTML=`<span class="plus-circle">+</span> add a task for ${label==='today'?'today':label}`;
  addRow.addEventListener('click',()=>openSheet(null,calSelectedDate));
  list.appendChild(addRow);
}

/* ══ TASK SWIPE — promote / demote ══ */
const SW_THRESH=72;
let lastActivate=0;
/* Single reliable entry point for activating a task (tap) */
function activateTask(taskEl,target){
  const now=Date.now();
  if(now-lastActivate<600)return;   // dedupe touch + synthesized click
  lastActivate=now;
  const taskId=taskEl.dataset.id;
  if(selectionMode){toggleTaskSelection(taskId);return;}
  if(target){
    if(target.closest('.task-check')){toggleTask(taskEl);return;}
    const chk=target.closest('.chk-item');
    if(chk){toggleCheckItem(chk);return;}
  }
  const t=curCat().tasks.find(x=>x.id===taskId);
  openSheet(t||null);
}
function attachTaskSwipe(el,bgR,bgL,task){
  let x0=0,y0=0,dx=0,dy=0,decided=false,swiping=false,startTarget=null,lpTimer=null,lpFired=false;
  function clearLP(){if(lpTimer){clearTimeout(lpTimer);lpTimer=null;}}
  el.addEventListener('touchstart',e=>{
    const t=e.touches[0];x0=t.clientX;y0=t.clientY;
    dx=0;dy=0;decided=false;swiping=false;lpFired=false;
    startTarget=e.target;el.classList.remove('task-sw-anim');
    // long-press → selection mode
    clearLP();
    lpTimer=setTimeout(()=>{
      lpFired=true;lpTimer=null;
      if(navigator.vibrate)try{navigator.vibrate(15);}catch(_){}
      selectionMode?toggleTaskSelection(task.id):enterSelectionMode(task.id);
    },500);
  },{passive:true});
  el.addEventListener('touchmove',e=>{
    if(e.touches.length!==1)return;
    const t=e.touches[0];dx=t.clientX-x0;dy=t.clientY-y0;
    if((Math.abs(dx)>9||Math.abs(dy)>9))clearLP();   // any real movement cancels long-press
    if(!decided){
      if(Math.abs(dx)>9&&Math.abs(dx)>Math.abs(dy)*1.1){decided=true;swiping=true;}
      else if(Math.abs(dy)>9){decided=true;}
    }
    if(!swiping)return;
    e.preventDefault();
    el.style.transform=`translateX(${dx}px)`;
    const pct=Math.min(1,Math.abs(dx)/SW_THRESH);
    if(dx>0){bgR.style.opacity=pct;bgL.style.opacity=0;}
    else{bgL.style.opacity=pct;bgR.style.opacity=0;}
  },{passive:false});
  function end(e){
    clearLP();
    bgR.style.opacity=0;bgL.style.opacity=0;
    el.classList.add('task-sw-anim');el.style.transform='';
    if(swiping){
      if(dx>SW_THRESH&&task.indent<5){
        task.indent++;
        el.className=el.className.replace(/\bindent-\d\b/g,'').replace(/\s+/g,' ').trim()+' indent-'+task.indent;
        flashTask(el,'d');showToast('your day','↳ demoted to level '+task.indent);persist();
      }else if(dx<-SW_THRESH&&task.indent>0){
        task.indent--;
        el.className=el.className.replace(/\bindent-\d\b/g,'').replace(/\s+/g,' ').trim();
        if(task.indent)el.className+=' indent-'+task.indent;
        flashTask(el,'p');showToast('your day','↱ promoted'+(task.indent===0?' to main task':' to level '+task.indent));persist();
      }
    }else if(!lpFired&&Math.abs(dx)<9&&Math.abs(dy)<9){
      // stationary tap → suppress the synthesized ghost click, then activate
      if(e&&e.cancelable)e.preventDefault();
      activateTask(el,startTarget);
    }
    swiping=false;decided=false;
  }
  el.addEventListener('touchend',end,{passive:false});
  el.addEventListener('touchcancel',()=>{clearLP();bgR.style.opacity=0;bgL.style.opacity=0;el.classList.add('task-sw-anim');el.style.transform='';swiping=false;decided=false;},{passive:true});
}
function flashTask(el,dir){el.classList.add('flash-'+dir);setTimeout(()=>el.classList.remove('flash-'+dir),480);}

/* ══ PIVOT LAYOUT ══ */
let titleOffsets=[],W=window.innerWidth;const PADL=26;
function measure(){W=window.innerWidth;titleOffsets=[...strip.children].map(el=>el.offsetLeft);}
function titleTranslateFor(f){const lo=Math.max(0,Math.floor(f)),hi=Math.min(cats.length+1,Math.ceil(f)),fr=f-lo;return PADL-(titleOffsets[lo]+(titleOffsets[hi]-titleOffsets[lo])*fr);}
function applyFloat(f){
  f=Math.max(0,Math.min(cats.length+1,f));
  pager.style.transform=`translateX(${-f*W}px)`;
  strip.style.transform=`translateX(${titleTranslateFor(f)}px)`;
  [...strip.children].forEach((el,i)=>{const d=Math.min(1,Math.abs(i-f));el.style.opacity=(1-d*0.74).toFixed(3);});
}
function layout(instant){
  measure();
  if(instant){pager.classList.remove('animate');strip.classList.remove('animate');}
  applyFloat(index);
  if(instant){void pager.offsetWidth;pager.classList.add('animate');strip.classList.add('animate');}
}
function goTo(i){index=Math.max(0,Math.min(cats.length+1,i));pager.classList.add('animate');strip.classList.add('animate');applyFloat(index);}

/* ══ SELECTION MODE ══ */
let selectionMode=false,selectedIds=new Set();
function enterSelectionMode(taskId){
  selectionMode=true;selectedIds.clear();selectedIds.add(taskId);
  document.body.classList.add('sel-mode');
  document.getElementById('selBar').classList.add('active');
  updateSelectionUI();renderPanel(index);
}
function exitSelectionMode(){
  selectionMode=false;selectedIds.clear();
  document.body.classList.remove('sel-mode');
  document.getElementById('selBar').classList.remove('active');
  renderPanel(index);
}
function toggleTaskSelection(taskId){
  if(selectedIds.has(taskId))selectedIds.delete(taskId);else selectedIds.add(taskId);
  updateSelectionUI();
  const taskEl=[...pager.children[index].querySelectorAll('.task')].find(el=>el.dataset.id===taskId);
  if(taskEl)taskEl.classList.toggle('task-sel-on',selectedIds.has(taskId));
}
function updateSelectionUI(){
  document.getElementById('selCount').textContent=selectedIds.size+' selected';
  document.getElementById('selEditWrap').style.display=selectedIds.size===1?'flex':'none';
}
document.getElementById('selEditBtn').addEventListener('click',()=>{

});
document.getElementById('selDoneBtn').addEventListener('click',()=>{const cc=curCat();if(cc)selectedIds.forEach(id=>{const t=cc.tasks.find(t=>t.id===id);if(t&&!t.done){t.done=true;t.completedAt=Date.now();}});persist();exitSelectionMode();});
document.getElementById('selUndoneBtn').addEventListener('click',()=>{const cc=curCat();if(cc)selectedIds.forEach(id=>{const t=cc.tasks.find(t=>t.id===id);if(t&&t.done){t.done=false;t.completedAt=null;}});persist();exitSelectionMode();});
document.getElementById('selShareBtn').addEventListener('click',()=>{
  const cc=curCat();const lines=cc?cc.tasks.filter(t=>selectedIds.has(t.id)).map(t=>t.text):[];
  navigator.clipboard&&navigator.clipboard.writeText(lines.join('\n')).then(()=>showToast('copied',lines.length+' task'+(lines.length!==1?'s':'')+' copied')).catch(()=>{});
  exitSelectionMode();
});
document.getElementById('selDelBtn').addEventListener('click',()=>{
  if(!selectedIds.size)return;
  if(!confirm('delete '+selectedIds.size+' task'+(selectedIds.size!==1?'s':'')+'?'))return;
  selectedIds.forEach(id=>{if(activeTimers[id]){clearTimeout(activeTimers[id]);delete activeTimers[id];}});
  const cc=curCat();if(cc)cc.tasks=cc.tasks.filter(t=>!selectedIds.has(t.id));
  persist();exitSelectionMode();
});
document.getElementById('selCancelBtn').addEventListener('click',exitSelectionMode);

/* ══ PAGER: category swipe (tasks handle their own tap/long-press/swipe via touch) ══ */
let dragging=false,decided=false,startX=0,startY=0,startT=0,pressEl=null,moved=false,origTarget=null;
pager.addEventListener('pointerdown',e=>{
  origTarget=e.target;startX=e.clientX;startY=e.clientY;startT=Date.now();
  decided=false;dragging=false;moved=false;
  try{pager.setPointerCapture(e.pointerId);}catch(_){}
  pressEl=origTarget.closest('.task');
});
pager.addEventListener('pointermove',e=>{
  const dx=e.clientX-startX,dy=e.clientY-startY;
  if(Math.abs(dx)>6||Math.abs(dy)>6)moved=true;
  if(!decided){
    if(Math.abs(dx)>8&&Math.abs(dx)>Math.abs(dy)){
      if(pressEl){decided=true;dragging=false;}  // task handles its own horizontal swipe
      else{decided=true;dragging=true;pager.classList.remove('animate');strip.classList.remove('animate');}
    }
    else if(Math.abs(dy)>8){decided=true;dragging=false;}
  }
  if(dragging){e.preventDefault();applyFloat(index-dx/W);}
},{passive:false});
function endDrag(e){
  if(dragging){
    const dx=e.clientX-startX,dt=Date.now()-startT,fast=Math.abs(dx)>40&&dt<260;
    if(dx<-W*0.22||(fast&&dx<0))goTo(index+1);
    else if(dx>W*0.22||(fast&&dx>0))goTo(index-1);
    else goTo(index);
  }else if(!moved){
    // tap on the empty add-category panel
    if(index===cats.length+1&&!origTarget.closest('.task')){openCatSheet();}
  }
  dragging=false;decided=false;pressEl=null;origTarget=null;
}
pager.addEventListener('pointerup',endDrag);
pager.addEventListener('pointercancel',()=>{dragging=false;decided=false;origTarget=null;});
/* desktop (mouse) fallback — taps don't fire touch events */
pager.addEventListener('click',e=>{
  const taskEl=e.target.closest('.task');if(!taskEl)return;
  if(moved)return;
  activateTask(taskEl,e.target);
});

/* pivot: tap=navigate, long-press=category options, swipe=change category — all via touch */
let pvX=0,pvY=0,pvMoved=false,pvLong=null,pvLongFired=false,pvTitleIdx=-1;
function pvClearLong(){if(pvLong){clearTimeout(pvLong);pvLong=null;}}
strip.addEventListener('touchstart',e=>{
  const t=e.target.closest('.pivot-title');
  pvX=e.touches[0].clientX;pvY=e.touches[0].clientY;pvMoved=false;pvLongFired=false;
  // only real category titles (not "your day" overview, not "+") get long-press options
  pvTitleIdx=(t&&!t.classList.contains('pivot-add')&&!t.classList.contains('pivot-overview'))?+t.dataset.i:-1;
  pvClearLong();
  if(pvTitleIdx>=0){
    pvLong=setTimeout(()=>{
      pvLong=null;pvLongFired=true;
      if(navigator.vibrate)try{navigator.vibrate(15);}catch(_){}
      showCatOptions(pvTitleIdx-1);   // convert panel index → cats[] array index
    },480);
  }
},{passive:true});
strip.addEventListener('touchmove',e=>{
  const dx=e.touches[0].clientX-pvX,dy=e.touches[0].clientY-pvY;
  if(Math.abs(dx)>8||Math.abs(dy)>8){pvMoved=true;pvClearLong();}
},{passive:true});
strip.addEventListener('touchend',e=>{
  pvClearLong();
  if(pvLongFired)return;                          // long-press already handled
  const dx=e.changedTouches[0].clientX-pvX;
  if(Math.abs(dx)>44){dx<0?goTo(index+1):goTo(index-1);return;}   // swipe = navigate
  if(!pvMoved){                                   // tap
    const t=e.target.closest('.pivot-title');if(!t)return;
    const i=+t.dataset.i;i===cats.length+1?openCatSheet():goTo(i);
  }
},{passive:true});
/* desktop fallback */
strip.addEventListener('click',e=>{
  if('ontouchstart'in window)return;
  const t=e.target.closest('.pivot-title');if(!t)return;
  const i=+t.dataset.i;i===cats.length+1?openCatSheet():goTo(i);
});

  if(task.done&&activeTimers[task.id]){clearTimeout(activeTimers[task.id]);delete activeTimers[task.id];}

function toggleCheckItem(el){

const MONS3_SHEET=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
const DOWS3_SHEET=['sun','mon','tue','wed','thu','fri','sat'];
function fmtDueDateLabel(key){
  const d=new Date(key+'T00:00:00');
  return DOWS3_SHEET[d.getDay()]+' '+d.getDate()+' '+MONS3_SHEET[d.getMonth()];
}
function setDueDateUI(key){
  sheetDueDate=key;
  if(key){
    dueDatePill.firstChild.textContent=fmtDueDateLabel(key)+' ';
    dueDateClearBtn.style.display='inline-flex';
  }else{
    dueDatePill.firstChild.textContent='no date ';
    dueDateClearBtn.style.display='none';
  }
}
dueDateInput.addEventListener('change',()=>{setDueDateUI(dueDateInput.value||null);});
dueDateClearBtn.addEventListener('click',e=>{e.preventDefault();dueDateInput.value='';setDueDateUI(null);});

function renderCatPicker(){
  const row=document.getElementById('catPickerRow');row.innerHTML='';
  cats.forEach((c,ci)=>{
    const b=document.createElement('button');b.className='pill'+(ci===sheetCatIdx?' active':'');
    b.textContent=c.name;b.dataset.ci=ci;
    b.addEventListener('click',()=>{
      sheetCatIdx=ci;
      [...row.children].forEach(x=>x.classList.toggle('active',+x.dataset.ci===ci));
      if(!editingTaskId)document.getElementById('sheetTitle').textContent='new task in '+cats[ci].name;
    });

}

function openSheet(task,prefillDueDate){
  if(index===cats.length+1){openCatSheet();return;}
  editingTaskId=task?task.id:null;
  document.body.style.webkitUserSelect='text';document.body.style.userSelect='text';
  newNoteType='text';newRepeat='none';newReminderVal='off';newIndent=0;
  taskInput.value='';noteInput.value='';noteArea.value='';
  setPills('noteTypeRow','text');setPills('repeatRow','none');setPills('reminderRow','off');
  noteInput.style.display='block';noteArea.classList.remove('show');
  document.getElementById('timeRow').classList.remove('show');document.getElementById('notifNote').textContent='';
  updateIndentUI();
  dueDateInput.value='';setDueDateUI(prefillDueDate||null);

  // default category: current category panel if viewing one, else first category (overview context)
  sheetCatIdx=(index>=1&&index<=cats.length)?index-1:0;

  if(task){
    const loc=findTaskLocation(task.id);
    if(loc)sheetCatIdx=loc.catIdx;
    document.getElementById('sheetTitle').textContent='edit task';document.getElementById('saveBtn').textContent='save';
    taskInput.value=task.text;newIndent=task.indent||0;updateIndentUI();
    if(task.dueDate){dueDateInput.value=task.dueDate;setDueDateUI(task.dueDate);}
    const n=normalizeNote(task.note);
    if(n){newNoteType=n.type;setPills('noteTypeRow',newNoteType);
      if(n.type==='text'){noteInput.value=n.text||'';}
      else{noteArea.value=(n.type==='bullets'?n.items:n.items.map(x=>x.text)).join('\n');noteInput.style.display='none';noteArea.classList.add('show');}
    }
    newRepeat=task.repeat||'none';setPills('repeatRow',newRepeat);
    if(task.reminder&&task.reminder.enabled){
      if(task.reminder.mode==='time'){newReminderVal='time';reminderTimeInput.value=task.reminder.timeOfDay||'08:00';document.getElementById('timeRow').classList.add('show');}
      else{const iv=String(task.reminder.intervalMinutes);newReminderVal=['15','30','60','120'].includes(iv)?iv:'off';}
      setPills('reminderRow',newReminderVal);
    }
  }else{
    document.getElementById('sheetTitle').textContent='new task in '+cats[sheetCatIdx].name;document.getElementById('saveBtn').textContent='add';
  }
  renderCatPicker();
  taskBg.classList.add('open');taskSheet.classList.add('open');sheetOpenedAt=Date.now();setTimeout(()=>taskInput.focus(),120);
}
let sheetOpenedAt=0;
/* Keep any open bottom-sheet above the on-screen keyboard (Android resizes the visual viewport) */
function anySheetOpen(){return document.querySelector('.sheet.open');}
if(window.visualViewport){
  const vv=window.visualViewport;
  function adjustSheets(){
    const lift=Math.max(0,(window.innerHeight-vv.height-vv.offsetTop));
    document.querySelectorAll('.sheet.open').forEach(s=>{s.style.bottom=lift+'px';});
  }
  vv.addEventListener('resize',adjustSheets);
  vv.addEventListener('scroll',adjustSheets);
}
function closeSheet(){document.body.style.webkitUserSelect='';document.body.style.userSelect='';taskBg.classList.remove('open');taskSheet.classList.remove('open');taskSheet.style.bottom='';}
function saveTask(){
  const text=taskInput.value.trim();if(!text){taskInput.focus();return;}
  let note=null;
  if(newNoteType==='text'){const v=noteInput.value.trim();if(v)note={type:'text',text:v};}
  else{
    const lines=noteArea.value.split('\n').map(l=>l.trim()).filter(Boolean);
    if(lines.length){
      if(newNoteType==='bullets')note={type:'bullets',items:lines};
      else{const prevLoc=editingTaskId?findTaskLocation(editingTaskId):null;const pi=(prevLoc&&prevLoc.task.note&&prevLoc.task.note.type==='checklist')?prevLoc.task.note.items:[];note={type:'checklist',items:lines.map((l,i)=>({text:l,checked:pi[i]?pi[i].checked:false}))};}
    }
  }
  let reminder=null;
  if(newReminderVal!=='off'){
    if(newReminderVal==='time'){const tv=reminderTimeInput.value||'08:00';reminder={enabled:true,mode:'time',timeOfDay:tv,scheduledFor:nextOccurrence(tv)};}
    else{const mins=parseInt(newReminderVal,10);reminder={enabled:true,mode:'interval',intervalMinutes:mins,scheduledFor:Date.now()+mins*60000};}
  }
  if(editingTaskId){
    const loc=findTaskLocation(editingTaskId);
    if(loc){
      const task=loc.task;
      task.text=text;task.note=note;task.repeat=newRepeat;task.reminder=reminder;task.indent=newIndent;task.dueDate=sheetDueDate;
      if(!reminder&&activeTimers[editingTaskId]){clearTimeout(activeTimers[editingTaskId]);delete activeTimers[editingTaskId];}
      if(sheetCatIdx!==loc.catIdx){
        // moved to a different category
        cats[loc.catIdx].tasks.splice(cats[loc.catIdx].tasks.findIndex(t=>t.id===editingTaskId),1);
        cats[sheetCatIdx].tasks.push(task);
      }
    }
  }else{
    cats[sheetCatIdx].tasks.push({id:uid(),text,note,indent:newIndent,done:false,createdAt:Date.now(),completedAt:null,repeat:newRepeat,reminder,dueDate:sheetDueDate});
  }
  build();persist();scheduleReminders();closeSheet();
}
document.getElementById('addBtn').addEventListener('click',()=>{
  if(index===0){openSheet(null,calSelectedDate);}else{openSheet(null);}
});
document.getElementById('cancelBtn').addEventListener('click',closeSheet);
document.getElementById('saveBtn').addEventListener('click',saveTask);
taskBg.addEventListener('click',()=>{if(Date.now()-sheetOpenedAt<600)return;closeSheet();});
taskInput.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();noteInput.style.display!=='none'?noteInput.focus():noteArea.focus();}});

/* ══ CATEGORY MANAGEMENT ══ */
const catBg=document.getElementById('catBg'),catSheet=document.getElementById('catSheet'),catInput=document.getElementById('catInput');
function openCatSheet(editIdx){
  catSheet._editIdx=(editIdx!==undefined)?editIdx:-1;const isEdit=catSheet._editIdx>=0;
  document.getElementById('catSheetTitle').textContent=isEdit?'rename category':'new category';
  document.getElementById('catSaveBtn').textContent=isEdit?'rename':'create';
  catInput.value=isEdit?cats[catSheet._editIdx].name:'';
  catBg.classList.add('open');catSheet.classList.add('open');catOpenedAt=Date.now();setTimeout(()=>catInput.focus(),120);
}
let catOpenedAt=0;
function closeCatSheet(){catBg.classList.remove('open');catSheet.classList.remove('open');catSheet.style.bottom='';}
function saveCat(){
  const name=catInput.value.trim();if(!name){catInput.focus();return;}
  const isEdit=catSheet._editIdx>=0;
  const editIdx=catSheet._editIdx;
  if(document.activeElement&&document.activeElement.blur)document.activeElement.blur();
  closeCatSheet();          // close FIRST, unconditionally
  catSheet._editIdx=-1;
  if(isEdit){cats[editIdx].name=name;closeCatOptSheet();}
  else{cats.push({id:uid(),name,tasks:[]});index=cats.length;}
  build();persist();
}
catBg.addEventListener('click',()=>{if(Date.now()-catOpenedAt<600)return;closeCatSheet();});
document.getElementById('catCancelBtn').addEventListener('click',closeCatSheet);
document.getElementById('catSaveBtn').addEventListener('click',saveCat);
catInput.addEventListener('keydown',e=>{if(e.key==='Enter')saveCat();});
const catOptBg=document.getElementById('catOptBg'),catOptSheet=document.getElementById('catOptSheet');
function closeCatOptSheet(){catOptBg.classList.remove('open');catOptSheet.classList.remove('open');}
catOptBg.addEventListener('click',closeCatOptSheet);
function showCatOptions(i){
  const cat=cats[i];if(!cat)return;
  document.getElementById('catOptName').textContent=cat.name;
  const btns=document.getElementById('catOptBtns');btns.innerHTML='';
  const ren=document.createElement('button');ren.className='action-btn';ren.textContent='rename';ren.onclick=()=>{closeCatOptSheet();openCatSheet(i);};btns.appendChild(ren);
  if(cat.tasks.length>1){
    const rt=document.createElement('button');rt.className='action-btn';rt.textContent='reorder tasks';rt.onclick=()=>{closeCatOptSheet();openTaskReorderSheet(i);};btns.appendChild(rt);
  }
  const reord=document.createElement('button');reord.className='action-btn';reord.textContent='reorder categories';reord.onclick=()=>{closeCatOptSheet();openReorderSheet();};btns.appendChild(reord);
  if(cats.length>1){
    const del=document.createElement('button');del.className='action-btn action-del';

    del.onclick=()=>{cat.tasks.forEach(t=>{if(activeTimers[t.id]){clearTimeout(activeTimers[t.id]);delete activeTimers[t.id];}});cats.splice(i,1);index=Math.max(0,Math.min(index,cats.length+1));persist();closeCatOptSheet();build();};
    btns.appendChild(del);
  }
  catOptBg.classList.add('open');catOptSheet.classList.add('open');
}
/* reorder */
const reorderBg=document.getElementById('reorderBg'),reorderSheet=document.getElementById('reorderSheet');
let reorderDragInited=false;
function openReorderSheet(){buildReorderList();if(!reorderDragInited){initReorderDrag(document.getElementById('reorderList'));reorderDragInited=true;}reorderBg.classList.add('open');reorderSheet.classList.add('open');}
function closeReorderSheet(){reorderBg.classList.remove('open');reorderSheet.classList.remove('open');reorderSheet.style.bottom='';index=Math.max(0,Math.min(index,cats.length+1));build();}
reorderBg.addEventListener('click',closeReorderSheet);
document.getElementById('reorderDoneBtn').addEventListener('click',closeReorderSheet);
function buildReorderList(){
  const list=document.getElementById('reorderList');list.innerHTML='';
  cats.forEach((cat,i)=>{
    const item=document.createElement('div');item.className='reorder-item';item.dataset.i=i;
    item.innerHTML=`<span class="reorder-handle">&#8801;</span><span class="reorder-name">${cat.name}</span><span class="reorder-count">${cat.tasks.length?cat.tasks.length+' task'+(cat.tasks.length!==1?'s':''):''}</span>`;
    list.appendChild(item);
  });
}
function initReorderDrag(list){
  let dragEl=null,fromIdx=-1,startY=0,origMids=[];
  list.addEventListener('pointerdown',e=>{
    const item=e.target.closest('.reorder-item');if(!item)return;
    e.preventDefault();list.setPointerCapture(e.pointerId);
    const items=[...list.querySelectorAll('.reorder-item')];
    fromIdx=items.indexOf(item);origMids=items.map(el=>el.getBoundingClientRect().top+el.offsetHeight/2);
    startY=e.clientY;dragEl=item;dragEl.classList.add('is-dragging');
  },{passive:false});
  list.addEventListener('pointermove',e=>{
    if(!dragEl)return;e.preventDefault();
    const dy=e.clientY-startY;dragEl.style.transform=`translateY(${dy}px)`;
    const dragMidY=dragEl.getBoundingClientRect().top+dragEl.offsetHeight/2;const ih=dragEl.offsetHeight;
    const items=[...list.querySelectorAll('.reorder-item')];
    items.forEach((item,i)=>{if(item===dragEl)return;if(i<fromIdx&&dragMidY<origMids[i])item.style.transform=`translateY(${ih}px)`;else if(i>fromIdx&&dragMidY>origMids[i])item.style.transform=`translateY(-${ih}px)`;else item.style.transform='';});
  },{passive:false});
  function drop(){
    if(!dragEl)return;
    const items=[...list.querySelectorAll('.reorder-item')];
    const dragMidY=dragEl.getBoundingClientRect().top+dragEl.offsetHeight/2;
    const newIdx=origMids.filter((mid,i)=>i!==fromIdx&&mid<dragMidY).length;
    items.forEach(item=>{item.style.transform='';item.classList.remove('is-dragging');});
    const fi=fromIdx;dragEl=null;fromIdx=-1;
    if(newIdx!==fi){const moved=cats.splice(fi,1)[0];cats.splice(newIdx,0,moved);if(index===fi)index=newIdx;else if(fi<newIdx&&index>fi&&index<=newIdx)index--;else if(fi>newIdx&&index>=newIdx&&index<fi)index++;persist();buildReorderList();}
  }
  list.addEventListener('pointerup',drop);list.addEventListener('pointercancel',drop);
}

/* reorder tasks within a category */
const taskReorderBg=document.getElementById('taskReorderBg'),taskReorderSheet=document.getElementById('taskReorderSheet');
let taskReorderCatIdx=-1,taskReorderInited=false;
function openTaskReorderSheet(catIdx){
  taskReorderCatIdx=catIdx;
  document.getElementById('taskReorderTitle').textContent='reorder '+cats[catIdx].name;
  buildTaskReorderList();
  if(!taskReorderInited){initTaskReorderDrag(document.getElementById('taskReorderList'));taskReorderInited=true;}
  taskReorderBg.classList.add('open');taskReorderSheet.classList.add('open');
}
function closeTaskReorderSheet(){taskReorderBg.classList.remove('open');taskReorderSheet.classList.remove('open');taskReorderSheet.style.bottom='';build();}
taskReorderBg.addEventListener('click',closeTaskReorderSheet);
document.getElementById('taskReorderDoneBtn').addEventListener('click',closeTaskReorderSheet);
function buildTaskReorderList(){
  const list=document.getElementById('taskReorderList');list.innerHTML='';
  cats[taskReorderCatIdx].tasks.forEach((task,i)=>{
    const item=document.createElement('div');item.className='reorder-item';item.dataset.i=i;
    const indentPad=task.indent?('margin-left:'+(task.indent*14)+'px;'):'';
    item.innerHTML=`<span class="reorder-handle">&#8801;</span><span class="reorder-name" style="${indentPad}font-size:${task.indent?17:20}px;${task.done?'opacity:.4;text-decoration:line-through;':''}">${escapeHtml(task.text)}</span>`;
    list.appendChild(item);
  });
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function initTaskReorderDrag(list){
  let dragEl=null,fromIdx=-1,startY=0,origMids=[];
  list.addEventListener('pointerdown',e=>{
    const item=e.target.closest('.reorder-item');if(!item)return;
    e.preventDefault();list.setPointerCapture(e.pointerId);
    const items=[...list.querySelectorAll('.reorder-item')];
    fromIdx=items.indexOf(item);origMids=items.map(el=>el.getBoundingClientRect().top+el.offsetHeight/2);
    startY=e.clientY;dragEl=item;dragEl.classList.add('is-dragging');
  },{passive:false});
  list.addEventListener('pointermove',e=>{
    if(!dragEl)return;e.preventDefault();
    const dy=e.clientY-startY;dragEl.style.transform=`translateY(${dy}px)`;
    const dragMidY=dragEl.getBoundingClientRect().top+dragEl.offsetHeight/2;const ih=dragEl.offsetHeight;
    const items=[...list.querySelectorAll('.reorder-item')];
    items.forEach((item,i)=>{if(item===dragEl)return;if(i<fromIdx&&dragMidY<origMids[i])item.style.transform=`translateY(${ih}px)`;else if(i>fromIdx&&dragMidY>origMids[i])item.style.transform=`translateY(-${ih}px)`;else item.style.transform='';});
  },{passive:false});
  function drop(){
    if(!dragEl)return;
    const dragMidY=dragEl.getBoundingClientRect().top+dragEl.offsetHeight/2;
    const newIdx=origMids.filter((mid,i)=>i!==fromIdx&&mid<dragMidY).length;
    [...list.querySelectorAll('.reorder-item')].forEach(item=>{item.style.transform='';item.classList.remove('is-dragging');});
    const fi=fromIdx;dragEl=null;fromIdx=-1;
    if(newIdx!==fi){const arr=cats[taskReorderCatIdx].tasks;const moved=arr.splice(fi,1)[0];arr.splice(newIdx,0,moved);persist();buildTaskReorderList();}
  }
  list.addEventListener('pointerup',drop);list.addEventListener('pointercancel',drop);
}
const accountBg=document.getElementById('accountBg'),accountSheet=document.getElementById('accountSheet');
function openAccountSheet(){accountBg.classList.add('open');accountSheet.classList.add('open');}
function closeAccountSheet(){accountBg.classList.remove('open');accountSheet.classList.remove('open');}
accountBg.addEventListener('click',closeAccountSheet);
document.getElementById('userBtn').addEventListener('click',openAccountSheet);
document.getElementById('signOutBtn').addEventListener('click',()=>{

/* ══ AUTH ══ */
function updateUserAvatar(user){
  const btn=document.getElementById('userBtn');
  const initial=(user.displayName||user.email||'?')[0].toUpperCase();
  btn.textContent=initial;btn.classList.add('visible');
  document.getElementById('acctAvatar').textContent=initial;
  document.getElementById('acctName').textContent=user.displayName||'';
  document.getElementById('acctEmail').textContent=user.email||'';
}

// Google sign-in
document.getElementById('googleSignInBtn').addEventListener('click',()=>{
  document.getElementById('splashError').textContent='';
  const provider=new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(err=>{
    document.getElementById('splashError').textContent=
      err.code==='auth/popup-blocked'?'allow popups for this site and try again':
      err.code==='auth/cancelled-popup-request'?'':
      'sign-in failed — try again';
  });
});

// Auth state listener — this is the main entry point
auth.onAuthStateChanged(async user=>{
  currentUser=user;
  document.getElementById('splashLoading').classList.remove('show');

  if(user){
    // Signed in — load data and launch the app
    updateUserAvatar(user);
    if(!getUserName()&&user.displayName){setUserName(user.displayName.split(' ')[0]);}
    updateKicker();
    const saved=await load();
    cats=migrateData(saved&&Array.isArray(saved)&&saved.length?saved:makeSeed());
    resetRecurring();build();scheduleReminders();
    subscribeToChanges();
    dismissSplash();
  }else{
    // Not signed in — show Google button
    document.getElementById('splashSignIn').classList.add('show');
  }
});

/* ══ USER NAME ══ */
const NAME_KEY='yourday:name';
function getUserName(){try{return localStorage.getItem(NAME_KEY)||'';}catch(_){return'';}}
function setUserName(n){try{localStorage.setItem(NAME_KEY,n);}catch(_){}}
function updateKicker(){
  const n=getUserName();
  document.getElementById('kicker').textContent='a glance at your day'+(n?', '+n:'');
  const now=new Date();
  document.getElementById('kickerDate').textContent=DAYS[now.getDay()]+' '+now.getDate()+' '+MONS[now.getMonth()];
}

/* ══ SPLASH ══ */
let splashDone=false;
function dismissSplash(){
  if(splashDone)return;splashDone=true;
  const el=document.getElementById('splash');if(!el)return;
  el.classList.add('hiding');setTimeout(()=>el.remove(),600);

/* ══ CLOCK + MIDNIGHT ══ */
function tick(){const d=new Date(),h=d.getHours(),m=String(d.getMinutes()).padStart(2,'0');document.getElementById('clock').textContent=h+':'+m;}
setInterval(tick,10000);tick();
function schedMidnight(){const now=new Date(),next=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1);setTimeout(()=>{resetRecurring();updateKicker();[...Array(cats.length).keys()].forEach(i=>renderPanel(i));if(pager.children[0])renderOverviewPanel(pager.children[0]);schedMidnight();},next-now);}
window.addEventListener('resize',()=>layout(true));
schedMidnight();

applyTheme(loadTheme());
updateKicker();

if('serviceWorker'in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
